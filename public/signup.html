<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — The Foreman</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 40px 36px;
      width: 100%;
      max-width: 480px;
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1a1a1a;
    }
    .tagline {
      color: #666;
      font-size: 15px;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }
    .hint {
      font-size: 12px;
      font-weight: 400;
      color: #888;
      margin-left: 4px;
    }
    input[type="text"],
    input[type="tel"],
    input[type="email"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.15s;
      outline: none;
      margin-bottom: 20px;
    }
    input:focus {
      border-color: #2563eb;
    }
    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button[type="submit"]:hover {
      background: #1d4ed8;
    }
    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #999;
      text-align: center;
      line-height: 1.6;
    }
    @media (max-width: 480px) {
      .card { padding: 28px 20px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🔨 The Foreman</div>
    <p class="tagline">WhatsApp-based job management for tradespeople. No app. Just text.</p>

    <form method="POST" action="/signup">
      <label for="business_name">Business name</label>
      <input type="text" id="business_name" name="business_name" placeholder="Dave's Plumbing" required autocomplete="organization">

      <label for="contact_name">Your name</label>
      <input type="text" id="contact_name" name="contact_name" placeholder="Dave Smith" required autocomplete="name">

      <label for="phone">
        WhatsApp number
        <span class="hint">— the number you'll use to text The Foreman</span>
      </label>
      <input type="tel" id="phone" name="phone" placeholder="07700 900123" required autocomplete="tel">

      <label for="email">Email address <span class="hint">— for account notifications</span></label>
      <input type="email" id="email" name="email" placeholder="dave@example.com" autocomplete="email">

      <button type="submit">Request access</button>
    </form>

    <p class="footer">We'll review your application and get back to you within one working day.</p>
  </div>
</body>
</html>
